                header: true,

        // 智能提取乐器
        function extractInstrument(talentStr) {
            if (!talentStr) return "未知";
            const regex = /吉他|琵琶|钢琴|中阮|小提琴|大提琴|古筝|架子鼓|贝斯|键盘|萨克斯|二胡|笛子|合成器/g;
            const matches = talentStr.match(regex);
            return matches ? [...new Set(matches)].join('/') : "未知";
        }

        // 大类归并逻辑
        function categorizeTalent(talentStr) {
            if (!talentStr) return [];
            const str = talentStr.toLowerCase();
            let cats = new Set();
            if (str.match(/唱|流行|民谣|美声|阿卡贝拉|vocal|声乐/i)) cats.add('唱歌类');
            if (str.match(/舞|爵士|kpop|街舞|hiphop|古典舞/i)) cats.add('舞蹈类');
            if (str.match(/吉他|琵琶|钢琴|中阮|琴|鼓|贝斯|键盘|萨克斯|二胡|笛|乐器|乐队/i)) cats.add('乐器类');
            if (str.match(/配音|朗诵|主持|表演|话剧|小品/i)) cats.add('主持/表演类');
            if (str.match(/画|书法|设计|摄影|摄像|剪辑|视频|后期/i)) cats.add('视觉/影像类');
            if (str.match(/策划|编导|导演|剧本/i)) cats.add('策划/编导类');
            
            if (cats.size === 0 && !str.match(/不清楚/)) cats.add('其他技能');
            return Array.from(cats);
        }

        function processData(data) {
            // 兼容轻微的名称变动
            const headers = Object.keys(data[0] || {});
            const nameCol = headers.find(h => h.includes('姓名')) || headers[1];
            const talentCol = headers.find(h => h.includes('擅长的方向')) || headers[6];
            const expCol = headers.find(h => h.includes('学习体验')) || headers[9];
            const flashCol = headers.find(h => h.includes('快闪')) || headers[13];

            // 数据容器
            let talentsMap = {};
            let expMap = {};
            let flashMob = {
                core: { '唱歌组': [], '乐器组': [], '跳舞组': [] },
                support: { '现场氛围组': [], '摄影摄像组': [], '后勤场务组': [] }
            };

            data.forEach(row => {
                const name = row[nameCol];
                if (!name) return;

                const talent = row[talentCol] || "";
                const exp = row[expCol] || "";
                const flash = row[flashCol] || "";

                // 1. 处理擅长方向
                let userTalents = categorizeTalent(talent);
                userTalents.forEach(t => {
                    if (!talentsMap[t]) talentsMap[t] = [];
                    if (!talentsMap[t].includes(name)) talentsMap[t].push(name);
                });

				// 2. 处理学习体验（只统计四大类）
				if (exp) {
					let exps = exp.split('┋');  // 只按多选分隔符切

					exps.forEach(e => {
						let cleanExp = e.split('（')[0]   // 去掉括号说明
										.replace(/其他建议.*/,'')  // 去掉“其他建议”
										.replace(/其他：?/,'')     // 去掉“其他”
										.trim();

						// 只保留四大类
						const validTypes = ['休闲联谊类','培训教学类','竞赛展览类','实践创作类'];

						if (validTypes.includes(cleanExp)) {
							expMap[cleanExp] = (expMap[cleanExp] || 0) + 1;
						}
					});
				}

                // 3. 处理快闪分组
                if (flash) {
                    let isSing = flash.match(/唱/);
                    let isInst = flash.match(/乐队|乐器|演奏|伴奏/);
                    let isDance = flash.match(/舞/);
                    let addedToCore = false;

                    // 核心组优先分配
                    if (isSing) { flashMob.core['唱歌组'].push(name); addedToCore = true; }
                    if (isInst) { 
                        let inst = extractInstrument(talent);
                        // 存为对象，渲染时再拼 HTML，避免从 HTML 反向解析名字
                        flashMob.core['乐器组'].push({ name, inst }); 
                        addedToCore = true; 
                    }
                    if (isDance) { flashMob.core['跳舞组'].push(name); addedToCore = true; }

                    // 如果没有选核心组，才分配到辅助组
                    if (!addedToCore) {
                        if (flash.match(/氛围|气氛|举牌|带动/)) flashMob.support['现场氛围组'].push(name);
                        if (flash.match(/摄影|摄像|视频|拍照/)) flashMob.support['摄影摄像组'].push(name);
                        if (flash.match(/后勤|场务|物料|管理/)) flashMob.support['后勤场务组'].push(name);
                    }
                }
            });

            renderCharts(talentsMap, expMap);
            renderLists(talentsMap, flashMob);
        }

        function renderCharts(talentsMap, expMap) {
            // 柱状图：擅长方向
            const talentChart = echarts.init(document.getElementById('talentChart'));
            const talentCategories = Object.keys(talentsMap);
            const talentCounts = talentCategories.map(k => talentsMap[k].length);
            
            talentChart.setOption({
                tooltip: { trigger: 'axis' },
                color: ['#6366f1'],
                xAxis: { type: 'category', data: talentCategories, axisLabel: { interval: 0, rotate: 15 } },
                yAxis: { type: 'value', minInterval: 1 },
                series: [{ data: talentCounts, type: 'bar', barWidth: '40%', label: { show: true, position: 'top' }, itemStyle: { borderRadius: [4, 4, 0, 0] } }]
            });

            // 饼图：学习体验
            const expChart = echarts.init(document.getElementById('experienceChart'));
            const expData = Object.keys(expMap).map(k => ({ name: k, value: expMap[k] }));

            expChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c}人 ({d}%)' },
                legend: { bottom: '0%', left: 'center' },
                color: ['#8b5cf6', '#ec4899', '#14b8a6', '#f59e0b', '#3b82f6'],
                series: [{
                    type: 'pie', radius: ['40%', '70%'], avoidLabelOverlap: false,
                    itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                    label: { show: false, position: 'center' },
                    labelLine: { show: false },
                    data: expData
                }]
            });

            // 响应式调整
            window.addEventListener('resize', () => { talentChart.resize(); expChart.resize(); });
        }

        // 当前高亮的人名
        let currentHighlighted = null;

        // 将纯名字字符串包装成可点击的 span（保留乐器标注 HTML）
        function nameToTag(nameOrHtml, pureName) {
            return `<span class="name-tag" data-name="${pureName}" onclick="toggleHighlight('${pureName}')">${nameOrHtml}</span>`;
        }

        // 从乐器组成员 HTML 中提取纯名字（去掉乐器 span 标签）
        function extractPureName(memberHtml) {
            return memberHtml.replace(/<[^>]+>/g, '').trim();
        }

        function toggleHighlight(name) {
            if (currentHighlighted === name) {
                // 取消高亮
                document.querySelectorAll('.name-tag.highlighted').forEach(el => el.classList.remove('highlighted'));
                currentHighlighted = null;
            } else {
                // 切换高亮
                document.querySelectorAll('.name-tag.highlighted').forEach(el => el.classList.remove('highlighted'));
                document.querySelectorAll(`.name-tag[data-name="${name}"]`).forEach(el => el.classList.add('highlighted'));
                currentHighlighted = name;
            }
        }

        function renderLists(talentsMap, flashMob) {
            // 渲染擅长方向名单
            const talentListsDiv = document.getElementById('talentLists');
            talentListsDiv.innerHTML = '';
            for (const [category, names] of Object.entries(talentsMap)) {
                const nameTags = names.map(n => nameToTag(n, n)).join('<span class="text-gray-400">、</span>');
                talentListsDiv.innerHTML += `
                    <div class="bg-gray-50 rounded p-3 border border-gray-100">
                        <h4 class="font-bold text-gray-700 mb-2 pb-1 border-b">${category} (${names.length}人)</h4>
                        <p class="text-sm text-gray-600 leading-relaxed">${nameTags}</p>
                    </div>`;
            }

            // 渲染快闪核心组名单
            const coreGroupsDiv = document.getElementById('coreGroups');
            coreGroupsDiv.innerHTML = '';
            for (const [groupName, members] of Object.entries(flashMob.core)) {
                const memberItems = members.map(m => {
                    // 乐器组存的是 {name, inst} 对象，其他组存的是纯字符串
                    const pure = (typeof m === 'object') ? m.name : m;
                    const instBadge = (typeof m === 'object')
                        ? ` <span class="text-xs text-orange-600 bg-orange-100 px-1 rounded">(${m.inst})</span>`
                        : '';
                    return `<li>• <span class="name-tag" data-name="${pure}" onclick="toggleHighlight('${pure}')">${pure}</span>${instBadge}</li>`;
                }).join('');
                coreGroupsDiv.innerHTML += `
                    <div class="bg-indigo-50 rounded-lg p-4 border border-indigo-100 shadow-sm">
                        <div class="flex items-center justify-between mb-3 border-b border-indigo-200 pb-2">
                            <h4 class="font-bold text-indigo-800">${groupName}</h4>
                            <span class="bg-indigo-600 text-white text-xs px-2 py-1 rounded-full">${members.length} 人</span>
                        </div>
                        <ul class="text-sm text-gray-700 space-y-1">
                            ${members.length > 0 ? memberItems : '<li class="text-gray-400 italic">暂无人员</li>'}
                        </ul>
                    </div>`;
            }

            // 渲染快闪支持组名单
            const supportGroupsDiv = document.getElementById('supportGroups');
            supportGroupsDiv.innerHTML = '';
            for (const [groupName, members] of Object.entries(flashMob.support)) {
                const nameTags = members.map(n => nameToTag(n, n)).join('<span class="text-gray-400">、</span>');
                supportGroupsDiv.innerHTML += `
                    <div class="bg-emerald-50 rounded-lg p-4 border border-emerald-100 shadow-sm">
                        <div class="flex items-center justify-between mb-3 border-b border-emerald-200 pb-2">
                            <h4 class="font-bold text-emerald-800">${groupName}</h4>
                            <span class="bg-emerald-600 text-white text-xs px-2 py-1 rounded-full">${members.length} 人</span>
                        </div>
                        <p class="text-sm text-gray-700 leading-relaxed">
                            ${members.length > 0 ? nameTags : '<span class="text-gray-400 italic">暂无人员</span>'}
                        </p>
                    </div>`;
            }
        }
    </script>
